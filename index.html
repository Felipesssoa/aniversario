<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Caveat:wght@500;600;700&family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #161616;
    --panel: #262626;
    --panel-light: #333333;
    --cream: #EDECEA;
    --lilac: #9A9A9A;
    --gold: #C7A44A;
    --pink: #B5876A;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--night);
    color: var(--cream);
    font-family: 'Sora', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ---------- starfield ---------- */
  #stars{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .star{
    position: absolute;
    background: var(--cream);
    border-radius: 50%;
    opacity: 0.6;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity: .15; }
    50%{ opacity: .9; }
  }

  /* ---------- layout wrapper ---------- */
  main{ position: relative; z-index: 1; }

  /* ---------- hero ---------- */
  .hero{
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8vh 6vw 6vh;
  }

  .eyebrow{
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--lilac);
    margin-bottom: 1.6rem;
  }

  .eyebrow span{ color: var(--gold); }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(2.6rem, 8vw, 5.4rem);
    line-height: 1.05;
    max-width: 16ch;
  }

  h1 em{
    font-style: normal;
    font-weight: 600;
    color: var(--gold);
    font-style: italic;
  }

  .hero-sub{
    margin-top: 1.6rem;
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--lilac);
    max-width: 42ch;
    font-weight: 300;
  }

  /* ---------- candle wish ---------- */
  .wish{
    margin-top: 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .candle-wrap{
    cursor: pointer;
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }

  .candle{
    width: 14px;
    height: 60px;
    background: linear-gradient(180deg, #f6e2b0, var(--gold));
    border-radius: 3px;
    position: relative;
    box-shadow: inset -2px 0 4px rgba(0,0,0,0.2);
  }

  .flame{
    position: absolute;
    top: -26px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 26px;
    background: radial-gradient(circle at 50% 70%, #fff6d0, var(--gold) 55%, var(--pink) 100%);
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    animation: flicker 1.6s ease-in-out infinite;
    transform-origin: bottom center;
    transition: opacity .4s ease, transform .4s ease;
  }

  @keyframes flicker{
    0%,100%{ transform: translateX(-50%) scale(1) rotate(-2deg); }
    50%{ transform: translateX(-50%) scale(1.08) rotate(3deg); }
  }

  .flame.out{
    opacity: 0;
    transform: translateX(-50%) scale(0.3) translateY(10px);
  }

  .smoke{
    position: absolute;
    top: -30px;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(243,234,217,0.5);
    opacity: 0;
  }
  .smoke.go{
    animation: rise 1.4s ease-out forwards;
  }
  @keyframes rise{
    0%{ opacity: .6; transform: translate(-50%,0) scale(1); }
    100%{ opacity: 0; transform: translate(-70%,-70px) scale(3); }
  }

  .wish-label{
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--pink);
  }

  .wish-message{
    font-family: 'Caveat', cursive;
    font-size: 1.7rem;
    color: var(--cream);
    max-width: 30ch;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .6s ease, transform .6s ease;
    min-height: 2.4rem;
  }
  .wish-message.show{
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- section intro ---------- */
  .intro{
    text-align: center;
    padding: 4rem 6vw 2rem;
  }
  .intro h2{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
  }
  .intro p{
    color: var(--lilac);
    margin-top: 0.8rem;
    font-weight: 300;
  }

  /* ---------- scrapbook board ---------- */
  .board{
    max-width: 1180px;
    margin: 0 auto;
    padding: 3rem 6vw 8rem;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 2.4rem 1.6rem;
  }

  .card{
    position: relative;
    background: var(--panel);
    padding: 14px 14px 20px;
    border-radius: 3px;
    box-shadow: 0 20px 40px -18px rgba(0,0,0,0.6);
    transition: transform .35s ease, box-shadow .35s ease;
  }

  .card:hover{
    transform: translateY(-6px) rotate(0deg) !important;
    box-shadow: 0 28px 50px -16px rgba(0,0,0,0.7);
    z-index: 5;
  }

  .card:nth-child(1){ grid-column: 1 / 6;  transform: rotate(-3deg); }
  .card:nth-child(2){ grid-column: 6 / 13; transform: rotate(2deg); margin-top: 2.5rem; }
  .card:nth-child(3){ grid-column: 1 / 5;  transform: rotate(4deg); margin-top: 1rem; }
  .card:nth-child(4){ grid-column: 5 / 9;  transform: rotate(-2deg); margin-top: -1.5rem; }
  .card:nth-child(5){ grid-column: 9 / 13; transform: rotate(3deg); margin-top: 1.5rem; }
  .card:nth-child(6){ grid-column: 2 / 12; transform: rotate(-1.5deg); margin-top: 1rem; }
  .card:nth-child(7){ grid-column: 3 / 11; transform: rotate(2.5deg); margin-top: 1.5rem; }

  .tape{
    position: absolute;
    width: 70px;
    height: 24px;
    background: rgba(232,183,75,0.35);
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(-4deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .card img{
    width: 100%;
    display: block;
    object-fit: contain;
    background: #0d0a17;
  }

  .card:nth-child(1) img{ aspect-ratio: 853/1322; object-position: center; }
  .card:nth-child(2) img{ aspect-ratio: 16/9; }
  .card:nth-child(3) img{ aspect-ratio: 1/1; }
  .card:nth-child(4) img{ aspect-ratio: 4/3; }
  .card:nth-child(5) img{ aspect-ratio: 3/4; object-position: top; }
  .card:nth-child(6) img{ aspect-ratio: 21/9; }
  .card:nth-child(7) img{ aspect-ratio: 16/9; }

  .tag{
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pink);
    margin-top: 12px;
  }

  .caption{
    font-family: 'Caveat', cursive;
    font-size: 1.5rem;
    color: var(--cream);
    margin-top: 2px;
    line-height: 1.15;
  }

  /* ---------- footer ---------- */
  footer{
    text-align: center;
    padding: 3rem 6vw 5rem;
    color: var(--lilac);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }
  footer strong{ color: var(--gold); }

  /* ---------- responsive ---------- */

  /* small tablet: simplify to a calm 2-column grid */
  @media (max-width: 700px) and (min-width: 601px){
    .board{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem 1.2rem;
      padding: 2rem 6vw 5rem;
    }
    .card{ grid-column: auto !important; margin-top: 0 !important; }
    .card:nth-child(1){ transform: rotate(-2deg); }
    .card:nth-child(2){ transform: rotate(2deg); }
    .card:nth-child(3){ transform: rotate(1.5deg); }
    .card:nth-child(4){ transform: rotate(-1.5deg); }
    .card:nth-child(5){ transform: rotate(2deg); }
    .card:nth-child(6){ grid-column: span 2 !important; transform: rotate(-1deg); }
    .card:nth-child(7){ grid-column: span 2 !important; transform: rotate(1deg); }
    .card:nth-child(1) img{ aspect-ratio: 853/1322; }
  }

  /* tablet: keep the grid feel but calm the tilts and tighten spacing */
  @media (max-width: 980px) and (min-width: 701px){
    .board{ gap: 2rem 1.2rem; padding: 2.5rem 5vw 6rem; }
    .card:nth-child(1){ transform: rotate(-2deg); }
    .card:nth-child(2){ transform: rotate(1.5deg); margin-top: 1.6rem; }
    .card:nth-child(3){ transform: rotate(2deg); margin-top: 0.6rem; }
    .card:nth-child(4){ transform: rotate(-1.5deg); margin-top: -0.8rem; }
    .card:nth-child(5){ transform: rotate(2deg); margin-top: 1rem; }
    .card:nth-child(6){ transform: rotate(-1deg); margin-top: 0.6rem; }
    .card:nth-child(7){ transform: rotate(1.5deg); margin-top: 1rem; }
    .card:nth-child(1) img{ aspect-ratio: 853/1322; }
  }

  /* mobile: stack everything, drop rotation entirely, single readable column */
  @media (max-width: 600px){
    .hero{ min-height: 82vh; padding: 7vh 7vw 5vh; }
    .wish{ margin-top: 3rem; }
    .board{ display: flex; flex-direction: column; gap: 2.2rem; padding: 1.5rem 7vw 4rem; }
    .card{ transform: none !important; margin-top: 0 !important; width: 100%; }
    .card:hover{ transform: translateY(-4px) !important; }
    .card img{ aspect-ratio: 4/3 !important; object-position: center top; }
    .card:nth-child(1) img{ aspect-ratio: 853/1322 !important; object-position: center !important; }
    .tape{ width: 56px; height: 20px; }
  }

  /* very small phones */
  @media (max-width: 360px){
    .eyebrow{ font-size: 0.62rem; letter-spacing: 0.18em; }
    .caption{ font-size: 1.3rem; }
    .wish-message{ font-size: 1.45rem; }
    .card:nth-child(1) img{ aspect-ratio: 853/1322 !important; }
  }

  /* short / landscape phones */
  @media (max-height: 480px) and (orientation: landscape){
    .hero{ min-height: auto; padding: 3rem 6vw; }
    .wish{ margin-top: 2rem; }
  }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    .star, .flame{ animation: none; }
    html{ scroll-behavior: auto; }
  }

  :focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<div id="stars"></div>

<main>

  <section class="hero">
    <div class="eyebrow">hoje é <span>seu</span> dia</div>
    <h1>Feliz<br>Aniversário<em></em></h1>
    <p class="hero-sub">É um jeitinho diferente de dar comemorar seu aniversário, convidei essa galerinha pra te dar parabéns tmb!</p>

    <div class="wish">
      <button class="candle-wrap" id="candleBtn" aria-label="Toque na vela para fazer um pedido">
        <div class="candle">
          <div class="flame" id="flame"></div>
          <div class="smoke" id="smoke"></div>
        </div>
      </button>
      <div class="wish-label" id="wishLabel">toque na vela e faça um pedido</div>
      <div class="wish-message" id="wishMessage">Que esse ano seja cheio de tudo que te faz bem</div>
    </div>
  </section>



  <section class="board">

    <figure class="card">
      <div class="tape"></div>
      <img src="01-dog.png" alt="Cachorro border collie, seu companheiro de todos os dias">
      <div class="tag">Parbéns do Bob</div>
      <figcaption class="caption">Doguinho charmoso com a lingua pra fora</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="02-lol.png" alt="Arte de campeã de League of Legends">
      <div class="tag">Parabéns da Fadinha Lulu</div>
      <figcaption class="caption">Fadinha sadica que ri da desgraça alheia</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="03-cookie.png" alt="Cookie com gotas de chocolate">
      <div class="tag">Parabéns do Cookie</div>
      <figcaption class="caption">Um docinho anima o dia de qualquer um</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="04-bolorolo.png" alt="Bolo de rolo fatiado">
      <div class="tag">Parabéns do Bolo de rolo</div>
      <figcaption class="caption">pai da rocambole</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="05-anime.png" alt="Cena de anime Ao Haru Ride">
      <div class="tag">Parabéns da Futaba</div>
      <figcaption class="caption">Agitada e impulsiva</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="06-rainroom.png" alt="Instalação de arte Rain Room, silhueta sob luz e chuva">
      <div class="tag">Parabéns da chuva</div>
      <figcaption class="caption">Coisa boa é tomar banho de chuva</figcaption>
    </figure>

    <figure class="card">
      <div class="tape"></div>
      <img src="07-baralho.jpg" alt="Baralho de cartas">
      <div class="tag">Parabéns do Baralho</div>
      <figcaption class="caption">Uma jovem senhorita não anda sem o seu baralho</figcaptioparabénsn>
    </figure>

  </section>

</main>

<footer>
  feliz <strong>22</strong> aninhos
</footer>

<script>
  // starfield
  const starField = document.getElementById('stars');
  const starCount = window.innerWidth < 600 ? 60 : 120;
  for(let i=0;i<starCount;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2 + 1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.top = Math.random()*100+'%';
    s.style.left = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*4)+'s';
    s.style.animationDuration = (3+Math.random()*3)+'s';
    starField.appendChild(s);
  }

  // candle wish interaction
  const candleBtn = document.getElementById('candleBtn');
  const flame = document.getElementById('flame');
  const smoke = document.getElementById('smoke');
  const wishLabel = document.getElementById('wishLabel');
  const wishMessage = document.getElementById('wishMessage');
  let blownOut = false;

  candleBtn.addEventListener('click', () => {
    blownOut = !blownOut;
    if(blownOut){
      flame.classList.add('out');
      smoke.classList.add('go');
      wishLabel.textContent = 'pedido feito';
      wishMessage.classList.add('show');
      setTimeout(()=> smoke.classList.remove('go'), 1400);
    } else {
      flame.classList.remove('out');
      wishLabel.textContent = 'toque na vela e faça um pedido';
      wishMessage.classList.remove('show');
    }
  });
</script>

</body>
</html>
